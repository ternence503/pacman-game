<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小精靈 Pac-Man</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
  }
  canvas {
    display: block;
    border: 2px solid #2222ff;
    box-shadow: 0 0 30px #2222ff, 0 0 60px #0000aa;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    color: white;
  }
  #overlay h1 {
    font-size: 40px;
    color: #ffdd00;
    text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff6600;
    margin-bottom: 10px;
    letter-spacing: 3px;
  }
  #overlay h2 {
    font-size: 18px;
    color: #ffb897;
    margin-bottom: 30px;
  }
  .btn {
    background: linear-gradient(135deg, #1111aa, #3333ff);
    color: white;
    border: 2px solid #4444ff;
    padding: 14px 50px;
    font-size: 20px;
    border-radius: 30px;
    cursor: pointer;
    margin: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 15px #3333ff;
  }
  .btn:hover {
    background: linear-gradient(135deg, #3333cc, #5555ff);
    transform: scale(1.05);
    box-shadow: 0 0 25px #5555ff;
  }
  .instructions {
    color: #aaaaff;
    font-size: 13px;
    line-height: 2;
    text-align: center;
    margin-top: 20px;
  }
  .instructions b { color: #ffdd00; }
  #muteBtn { display: none; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>🟡 小精靈 PAC-MAN</h1>
    <h2>吃掉所有豆子，小心鬼魂！</h2>
    <button class="btn" id="startBtn">▶ 開始遊戲</button>
    <div class="instructions">
      <b>鍵盤：</b>方向鍵 ← → ↑ ↓ 移動 &nbsp;|&nbsp; <b>手機：</b>滑動螢幕<br>
      吃到<b style="color:#ffb897">大白點</b>後可以反吃鬼魂<br>
      共 <b>3 條命</b>，吃完所有豆子過關！
    </div>
  </div>
  <button id="muteBtn" title="靜音切換">🔊</button>
</div>

<script>
// ─── 常數 ───────────────────────────────────────────────
const TILE = 24, COLS = 28, ROWS = 31;
const W = COLS * TILE, H = ROWS * TILE + 80;
const FPS = 60;

const C = {
  BLACK:  '#000000', YELLOW: '#ffdc00', WHITE:  '#ffffff',
  BLUE:   '#0000c8', WALL:   '#2121ff', DOT:    '#ffb897',
  RED:    '#dc0000', PINK:   '#ffb8de', CYAN:   '#00ffde',
  ORANGE: '#ffb812', SCARED: '#0000b4', SCARED2:'#ffffff',
  GRAY:   '#646464', DARKBG: '#141414',
};

const MAZE_TEMPLATE = [
  "############################",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#2####.#####.##.#####.####2#",
  "#.####.#####.##.#####.####.#",
  "#..........................#",
  "#.####.##.########.##.####.#",
  "#.####.##.########.##.####.#",
  "#......##....##....##......#",
  "######.##### ## #####.######",
  "######.##### ## #####.######",
  "######.##          ##.######",
  "######.## ###44### ##.######",
  "######.## #555555# ##.######",
  "      .   #555555#   .      ",
  "######.## #555555# ##.######",
  "######.## ######## ##.######",
  "######.##          ##.######",
  "######.## ######## ##.######",
  "######.## ######## ##.######",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#.####.#####.##.#####.####.#",
  "#2..##.......  .......##..2#",
  "###.##.##.########.##.##.###",
  "###.##.##.########.##.##.###",
  "#......##....##....##......#",
  "#.##########.##.##########.#",
  "#.##########.##.##########.#",
  "#..........................#",
  "############################",
];

// ─── 音效引擎（Web Audio API）───────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let muted = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, dur, vol=0.35, type='square', delay=0) {
  if (muted || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + delay;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t);
    osc.stop(t + dur + 0.01);
  } catch(e) {}
}

function playSequence(notes, startDelay=0) {
  // notes: [{freq, dur, vol, type}]
  let t = startDelay;
  notes.forEach(n => {
    playTone(n.freq, n.dur, n.vol||0.35, n.type||'square', t);
    t += n.dur;
  });
}

const SFX = {
  wakaA: () => playTone(480, 0.055, 0.3),
  wakaB: () => playTone(320, 0.055, 0.3),
  power: () => playSequence([
    {freq:300,dur:0.06},{freq:500,dur:0.06},{freq:700,dur:0.08}
  ]),
  eatGhost: () => playSequence([
    {freq:200,dur:0.04},{freq:400,dur:0.04},{freq:600,dur:0.04},{freq:900,dur:0.08}
  ]),
  death: () => playSequence([
    {freq:880,dur:0.07},{freq:784,dur:0.07},{freq:698,dur:0.07},
    {freq:622,dur:0.07},{freq:554,dur:0.07},{freq:494,dur:0.07},
    {freq:440,dur:0.07},{freq:392,dur:0.07},{freq:349,dur:0.14},
  ]),
  clear: () => playSequence([
    {freq:523,dur:0.08},{freq:659,dur:0.08},{freq:784,dur:0.08},{freq:1047,dur:0.18}
  ]),
  start: () => playSequence([
    {freq:494,dur:0.10},{freq:494,dur:0.10},{freq:494,dur:0.10},
    {freq:392,dur:0.15},{freq:494,dur:0.10},{freq:587,dur:0.25},{freq:294,dur:0.25}
  ]),
};

// 循環警報聲（用 setInterval 模擬）
let sirenInterval = null, frightInterval = null;
let sirenOn = false, frightOn = false;
function startSiren() {
  if (sirenOn || muted) return;
  sirenOn = true;
  let hi = false;
  sirenInterval = setInterval(() => {
    if (!muted) playTone(hi ? 280 : 220, 0.18, 0.15, 'square');
    hi = !hi;
  }, 180);
}
function stopSiren() {
  sirenOn = false;
  clearInterval(sirenInterval);
}
function startFright() {
  if (frightOn || muted) return;
  frightOn = true;
  let hi = false;
  frightInterval = setInterval(() => {
    if (!muted) playTone(hi ? 160 : 130, 0.12, 0.12, 'square');
    hi = !hi;
  }, 120);
}
function stopFright() {
  frightOn = false;
  clearInterval(frightInterval);
}

// ─── 迷宮 ────────────────────────────────────────────────
function buildMap() {
  const tiles = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    const s = MAZE_TEMPLATE[r] || '';
    for (let c = 0; c < COLS; c++) {
      const ch = s[c] || ' ';
      if (ch === '#') row.push(0);
      else if (ch === '.') row.push(1);
      else if (ch === '2') row.push(2);
      else if (ch === '4') row.push(4);
      else if (ch === '5') row.push(5);
      else row.push(3);
    }
    tiles.push(row);
  }
  return tiles;
}

// ─── 繪圖工具 ─────────────────────────────────────────────
function drawWall(ctx, x, y) {
  ctx.fillStyle = C.WALL;
  ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
  ctx.strokeStyle = '#000080';
  ctx.lineWidth = 1;
  ctx.strokeRect(x*TILE+0.5, y*TILE+0.5, TILE-1, TILE-1);
}

function drawDot(ctx, x, y) {
  ctx.fillStyle = C.DOT;
  ctx.beginPath();
  ctx.arc(x*TILE+TILE/2, y*TILE+TILE/2, 3, 0, Math.PI*2);
  ctx.fill();
}

function drawPower(ctx, x, y, tick) {
  const r = 7 + 3 * Math.sin(tick * 0.08);
  ctx.fillStyle = C.DOT;
  ctx.beginPath();
  ctx.arc(x*TILE+TILE/2, y*TILE+TILE/2, r, 0, Math.PI*2);
  ctx.fill();
}

function drawPacman(ctx, cx, cy, mouthAngle, dir) {
  const r = TILE/2 - 2;
  const dirAngle = { '1,0': 0, '-1,0': Math.PI, '0,-1': -Math.PI/2, '0,1': Math.PI/2 };
  const base = dirAngle[dir] ?? 0;
  const mouth = mouthAngle * Math.PI / 180;
  ctx.fillStyle = C.YELLOW;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, base + mouth, base + Math.PI*2 - mouth);
  ctx.closePath();
  ctx.fill();
}

function drawGhost(ctx, cx, cy, color, scared, flash, tick) {
  const r = TILE/2 - 1;
  let c = scared ? (flash && Math.floor(tick/8)%2===0 ? C.SCARED2 : C.SCARED) : color;
  // body
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.lineTo(cx+r, cy+r);
  // wavy skirt
  const segs = 4, sw = (r*2)/segs;
  for (let i = segs; i >= 0; i--) {
    const rx = cx - r + i * sw;
    const ry = cy + r + (i%2===0 ? r/2 : 0);
    ctx.lineTo(rx, ry);
  }
  ctx.closePath();
  ctx.fill();
  // eyes
  if (!scared) {
    [[-r/2,-2],[r/2,-2]].forEach(([ox,oy]) => {
      ctx.fillStyle = C.WHITE;
      ctx.beginPath(); ctx.arc(cx+ox, cy+oy, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = C.BLUE;
      ctx.beginPath(); ctx.arc(cx+ox, cy+oy, 2, 0, Math.PI*2); ctx.fill();
    });
  } else {
    [[-r/2,-2],[r/2,-2]].forEach(([ox,oy]) => {
      ctx.fillStyle = C.SCARED2;
      ctx.beginPath(); ctx.arc(cx+ox, cy+oy, 3, 0, Math.PI*2); ctx.fill();
    });
  }
}

// ─── Pac-Man 類別 ─────────────────────────────────────────
class Pacman {
  constructor(tiles) {
    this.tiles = tiles;
    this.reset();
  }
  reset() {
    this.tx = 14.0; this.ty = 23.0;
    this.dir = [1,0]; this.nextDir = [1,0];
    this.speed = 0.1;
    this.mouth = 0; this.mouthDir = 1;
    this.alive = true; this.deadAnim = 0;
  }
  canMove(tx, ty) {
    let ix = Math.round(tx), iy = Math.round(ty);
    if (ix < 0) ix = COLS-1;
    if (ix >= COLS) ix = 0;
    if (iy < 0 || iy >= ROWS) return false;
    return this.tiles[iy][ix] !== 0;
  }
  update(keys) {
    if (!this.alive) { this.deadAnim++; return; }
    if (keys['ArrowLeft']||keys['a'])  this.nextDir = [-1,0];
    if (keys['ArrowRight']||keys['d']) this.nextDir = [1,0];
    if (keys['ArrowUp']||keys['w'])    this.nextDir = [0,-1];
    if (keys['ArrowDown']||keys['s'])  this.nextDir = [0,1];
    // try turn
    const nx = this.tx + this.nextDir[0]*this.speed;
    const ny = this.ty + this.nextDir[1]*this.speed;
    if (this.canMove(nx, ny)) this.dir = [...this.nextDir];
    // move
    const mx = this.tx + this.dir[0]*this.speed;
    const my = this.ty + this.dir[1]*this.speed;
    if (this.canMove(mx, my)) { this.tx = mx; this.ty = my; }
    if (this.tx < 0) this.tx = COLS-1;
    if (this.tx >= COLS) this.tx = 0;
    // mouth
    this.mouth += 5 * this.mouthDir;
    if (this.mouth >= 45) this.mouthDir = -1;
    if (this.mouth <= 0)  this.mouthDir = 1;
  }
  draw(ctx) {
    const cx = this.tx*TILE+TILE/2, cy = this.ty*TILE+TILE/2;
    if (!this.alive) {
      // death spin
      const angle = Math.min(this.deadAnim*10, 180) * Math.PI/180;
      const r = TILE/2-2;
      ctx.fillStyle = C.YELLOW;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, angle/2, Math.PI*2 - angle/2);
      ctx.closePath();
      ctx.fill();
    } else {
      drawPacman(ctx, cx, cy, this.mouth, this.dir.toString());
    }
  }
}

// ─── Ghost 類別 ───────────────────────────────────────────
const GHOST_COLORS  = [C.RED, C.PINK, C.CYAN, C.ORANGE];
const GHOST_HOME_X  = [13.5, 13.5, 11.5, 15.5];
const GHOST_HOME_Y  = [14.0, 14.0, 14.0, 14.0];
const GHOST_SCATTER = [[COLS-3,0],[3,0],[COLS-1,ROWS-3],[0,ROWS-3]];

class Ghost {
  constructor(idx, tiles) {
    this.idx = idx; this.tiles = tiles;
    this.color = GHOST_COLORS[idx];
    this.reset();
  }
  reset() {
    this.tx = GHOST_HOME_X[this.idx];
    this.ty = GHOST_HOME_Y[this.idx];
    this.dir = [0,-1]; this.speed = 0.08;
    this.mode = 'house';
    this.scared = false; this.scaredTimer = 0;
    this.eaten = false;
    this.houseTimer = this.idx * 120;
  }
  canMove(tx, ty, allowHouse=false) {
    let ix = Math.round(tx), iy = Math.round(ty);
    if (ix < 0) ix = COLS-1;
    if (ix >= COLS) ix = 0;
    if (iy < 0 || iy >= ROWS) return false;
    const t = this.tiles[iy][ix];
    if (t === 0) return false;
    if (t === 5 && !allowHouse) return false;
    return true;
  }
  getDirs(allowHouse=false) {
    const rev = [-this.dir[0], -this.dir[1]];
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    const res = [];
    for (const d of dirs) {
      if (d[0]===rev[0]&&d[1]===rev[1]) continue;
      if (this.canMove(this.tx+d[0], this.ty+d[1], allowHouse)) res.push(d);
    }
    return res.length ? res : [rev];
  }
  chooseDir(tx, ty, allowHouse=false) {
    const dirs = this.getDirs(allowHouse);
    let best = dirs[0], bestD = Infinity;
    for (const d of dirs) {
      const dx = this.tx+d[0]-tx, dy = this.ty+d[1]-ty;
      const dd = dx*dx + dy*dy;
      if (dd < bestD) { bestD = dd; best = d; }
    }
    return best;
  }
  update(pac, tick, scatterMode) {
    if (this.scared) {
      this.scaredTimer--;
      if (this.scaredTimer <= 0) { this.scared = false; if (this.mode==='frightened') this.mode='chase'; }
    }
    if (this.eaten) {
      const [gx,gy] = [13.5, 11.0];
      if (Math.abs(this.tx-gx)<0.2 && Math.abs(this.ty-gy)<0.2) {
        this.eaten=false; this.scared=false; this.mode='house';
        this.houseTimer=60; this.tx=GHOST_HOME_X[this.idx]; this.ty=GHOST_HOME_Y[this.idx];
      } else {
        this.dir = this.chooseDir(gx, gy, true);
      }
      const spd=0.15, nx=this.tx+this.dir[0]*spd, ny=this.ty+this.dir[1]*spd;
      if (this.canMove(nx,ny,true)){this.tx=nx;this.ty=ny;}
      if(this.tx<0)this.tx=COLS-1; if(this.tx>=COLS)this.tx=0;
      return;
    }
    if (this.mode==='house') {
      this.houseTimer--;
      this.ty += Math.sin(tick*0.1)*0.05;
      if (this.houseTimer<=0) {
        this.mode='scatter'; this.tx=13.5; this.ty=11.5; this.dir=[0,-1];
      }
      return;
    }
    const spd = this.scared ? 0.05 : this.speed;
    if (this.scared) {
      if (tick%8===0) this.dir = this.getDirs()[Math.floor(Math.random()*this.getDirs().length)];
    } else if (scatterMode) {
      const [sx,sy]=GHOST_SCATTER[this.idx];
      this.dir = this.chooseDir(sx,sy);
    } else {
      let tx=pac.tx, ty=pac.ty;
      if (this.idx===1) { tx+=pac.dir[0]*4; ty+=pac.dir[1]*4; }
      else if (this.idx===3) {
        const dx=this.tx-pac.tx, dy=this.ty-pac.ty;
        if (dx*dx+dy*dy<=64) { [tx,ty]=GHOST_SCATTER[this.idx]; }
      }
      this.dir = this.chooseDir(tx,ty);
    }
    const nx=this.tx+this.dir[0]*spd, ny=this.ty+this.dir[1]*spd;
    if (this.canMove(nx,ny)){this.tx=nx;this.ty=ny;}
    else { const d=this.getDirs(); if(d.length) this.dir=d[0]; }
    if(this.tx<0)this.tx=COLS-1; if(this.tx>=COLS)this.tx=0;
  }
  frighten() {
    if (!this.eaten) { this.scared=true; this.scaredTimer=360; this.mode='frightened'; }
  }
  draw(ctx, tick) {
    const cx=this.tx*TILE+TILE/2, cy=this.ty*TILE+TILE/2;
    const flash = this.scared && this.scaredTimer < 120;
    if (this.eaten) {
      // just eyes
      const r=TILE/2-1;
      [[-r/2,-2],[r/2,-2]].forEach(([ox,oy])=>{
        ctx.fillStyle=C.WHITE; ctx.beginPath();ctx.arc(cx+ox,cy+oy,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=C.BLUE;  ctx.beginPath();ctx.arc(cx+ox,cy+oy,2,0,Math.PI*2);ctx.fill();
      });
    } else {
      drawGhost(ctx, cx, cy, this.color, this.scared, flash, tick);
    }
  }
}

// ─── 主遊戲 ───────────────────────────────────────────────
class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    canvas.width = W; canvas.height = H;
    document.getElementById('gameContainer').style.width = W+'px';
    document.getElementById('gameContainer').style.height = H+'px';
    this.keys = {};
    this.state = 'title'; // title / playing / dead_pause / game_over
    this.touch = {x:null,y:null};
    this.bindEvents();
    this.initGame();
    requestAnimationFrame(() => this.loop());
  }

  bindEvents() {
    window.addEventListener('keydown', e => {
      this.keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      if (this.state==='title') { this.startGame(); return; }
      if ((e.key==='r'||e.key==='R') && (this.state==='game_over')) this.restartGame();
      if (e.key==='m'||e.key==='M') {
        muted = !muted;
        document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
        if (muted) { stopSiren(); stopFright(); }
      }
    });
    window.addEventListener('keyup', e => { this.keys[e.key] = false; });

    // touch swipe
    this.canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      this.touch = {x:t.clientX, y:t.clientY};
      e.preventDefault();
      if (this.state==='title') this.startGame();
    }, {passive:false});
    this.canvas.addEventListener('touchend', e => {
      const t = e.changedTouches[0];
      const dx = t.clientX - this.touch.x;
      const dy = t.clientY - this.touch.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        this.pac.nextDir = dx>0 ? [1,0] : [-1,0];
      } else {
        this.pac.nextDir = dy>0 ? [0,1] : [0,-1];
      }
      e.preventDefault();
    }, {passive:false});

    document.getElementById('muteBtn').addEventListener('click', () => {
      muted = !muted;
      document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
      if (muted) { stopSiren(); stopFright(); }
    });
  }

  initGame() {
    this.tiles = buildMap();
    this.origTiles = this.tiles.map(r=>[...r]);
    this.pac = new Pacman(this.tiles);
    this.ghosts = [0,1,2,3].map(i => new Ghost(i, this.tiles));
    this.score = 0; this.lives = 3; this.level = 1;
    this.tick = 0;
    this.deadPause = 0;
    this.scatterTimer = 0; this.scatterMode = true;
    this.eatCombo = 0;
    this.totalDots = this.tiles.flat().filter(t=>t===1||t===2).length;
    this.dotsEaten = 0;
    this.wakaToggle = false;
    this.anyFrightened = false;
  }

  startGame() {
    document.getElementById('overlay').style.display = 'none';
    this.state = 'playing';
    ensureAudio();
    SFX.start();
  }

  restartGame() {
    stopSiren(); stopFright();
    this.initGame();
    this.state = 'playing';
    ensureAudio();
    SFX.start();
  }

  resetLevel() {
    this.tiles = this.origTiles.map(r=>[...r]);
    this.pac.tiles = this.tiles;
    this.ghosts.forEach(g=>{g.tiles=this.tiles; g.reset();});
    this.pac.reset();
    this.totalDots = this.tiles.flat().filter(t=>t===1||t===2).length;
    this.dotsEaten = 0;
    this.scatterTimer = 0; this.scatterMode = true;
    this.eatCombo = 0;
  }

  nextLevel() {
    this.level++;
    this.tiles = buildMap();
    this.origTiles = this.tiles.map(r=>[...r]);
    const spd = Math.min(0.08+this.level*0.01, 0.14);
    const pspd = Math.min(0.1+this.level*0.005, 0.15);
    this.ghosts.forEach(g=>{g.tiles=this.tiles; g.speed=spd; g.reset();});
    this.pac.tiles = this.tiles; this.pac.speed = pspd; this.pac.reset();
    this.totalDots = this.tiles.flat().filter(t=>t===1||t===2).length;
    this.dotsEaten = 0;
    this.scatterTimer = 0; this.scatterMode = true;
    this.eatCombo = 0;
    this.state = 'playing';
  }

  checkEat() {
    const tx=Math.round(this.pac.tx), ty=Math.round(this.pac.ty);
    if (ty<0||ty>=ROWS||tx<0||tx>=COLS) return;
    const t = this.tiles[ty][tx];
    if (t===1) {
      this.tiles[ty][tx]=3; this.score+=10; this.dotsEaten++;
      this.wakaToggle = !this.wakaToggle;
      this.wakaToggle ? SFX.wakaA() : SFX.wakaB();
    } else if (t===2) {
      this.tiles[ty][tx]=3; this.score+=50; this.dotsEaten++;
      this.eatCombo=0;
      this.ghosts.forEach(g=>g.frighten());
      SFX.power();
    }
  }

  checkGhostCollision() {
    for (const g of this.ghosts) {
      if (g.mode==='house') continue;
      const dx=this.pac.tx-g.tx, dy=this.pac.ty-g.ty;
      if (Math.sqrt(dx*dx+dy*dy)<0.8) {
        if (g.scared && !g.eaten) {
          g.eaten=true; g.scared=false;
          this.eatCombo++;
          this.score += 200 * Math.pow(2, this.eatCombo-1);
          SFX.eatGhost();
        } else if (!g.eaten && !g.scared) {
          this.lives--;
          this.state='dead_pause'; this.deadPause=150;
          this.pac.alive=false;
          stopSiren(); stopFright();
          SFX.death();
          return;
        }
      }
    }
  }

  update() {
    this.tick++;

    if (this.state==='dead_pause') {
      this.deadPause--;
      this.pac.update(this.keys);
      if (this.deadPause<=0) {
        if (this.lives<=0) { this.state='game_over'; }
        else { this.resetLevel(); this.state='playing'; }
      }
      return;
    }
    if (this.state!=='playing') return;

    // scatter/chase cycle
    this.scatterTimer++;
    if      (this.scatterTimer < 420)  this.scatterMode = true;
    else if (this.scatterTimer < 1200) this.scatterMode = false;
    else if (this.scatterTimer < 1500) this.scatterMode = true;
    else                               this.scatterMode = false;

    this.pac.update(this.keys);
    this.checkEat();
    this.ghosts.forEach(g=>g.update(this.pac, this.tick, this.scatterMode));
    this.checkGhostCollision();

    // background sfx
    const frightNow = this.ghosts.some(g=>g.scared&&!g.eaten);
    if (frightNow !== this.anyFrightened) {
      this.anyFrightened = frightNow;
      if (frightNow) { stopSiren(); startFright(); }
      else           { stopFright(); startSiren(); }
    }
    if (!frightNow && !sirenOn && this.state==='playing') startSiren();

    if (this.dotsEaten >= this.totalDots) {
      stopSiren(); stopFright();
      SFX.clear();
      this.nextLevel();
    }
  }

  draw() {
    const ctx = this.ctx;
    ctx.fillStyle = C.BLACK;
    ctx.fillRect(0, 0, W, H);

    // maze
    for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) {
      const t = this.tiles[y][x];
      if      (t===0) drawWall(ctx,x,y);
      else if (t===1) drawDot(ctx,x,y);
      else if (t===2) drawPower(ctx,x,y,this.tick);
    }

    this.pac.draw(ctx);
    this.ghosts.forEach(g=>g.draw(ctx,this.tick));

    // HUD
    const y0 = ROWS*TILE;
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, y0, W, 80);

    ctx.fillStyle = C.WHITE;
    ctx.font = 'bold 24px Arial';
    ctx.fillText(`SCORE: ${this.score}`, 10, y0+32);

    ctx.fillStyle = C.YELLOW;
    ctx.font = 'bold 20px Arial';
    ctx.fillText(`LEVEL ${this.level}`, W/2-30, y0+32);

    // lives
    for (let i=0;i<this.lives;i++) {
      drawPacman(ctx, W-30-i*30, y0+20, 20, '1,0');
    }

    ctx.fillStyle = C.GRAY;
    ctx.font = '14px Arial';
    ctx.fillText('方向鍵移動  R重玩  M音效', 10, y0+62);

    // 音效開關圖示
    const icon = muted ? '🔇' : '🔊';
    ctx.font = '22px Arial';
    ctx.fillText(icon, W-36, y0+68);

    // overlays
    if (this.state==='game_over') {
      this.drawOverlay('GAME OVER', `最終分數: ${this.score} ── 按 R 重新開始`);
    }
  }

  drawOverlay(title, sub='') {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = C.YELLOW;
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(title, W/2, H/2-20);
    if (sub) {
      ctx.fillStyle = C.WHITE;
      ctx.font = '20px Arial';
      ctx.fillText(sub, W/2, H/2+20);
    }
    ctx.textAlign = 'left';
  }

  loop() {
    this.update();
    this.draw();
    requestAnimationFrame(() => this.loop());
  }
}

// ─── 啟動 ─────────────────────────────────────────────────
const game = new Game(document.getElementById('c'));
document.getElementById('startBtn').addEventListener('click', () => {
  game.startGame();
});
</script>
